name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/porttrack

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: docker build -t $ECR_REPOSITORY:${{ github.run_number }} .

      - name: Run tests
        run: ./run-tests.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REPOSITORY

      - name: Push Docker image to ECR
        run: docker push $ECR_REPOSITORY:${{ github.run_number }}

      - name: Deploy to Staging (EKS)
        run: |
          kubectl apply -f k8s/manifests/staging/ --record
        env:
          KUBECONFIG: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: Approval for Production
        if: ${{ success() }}
        uses: chrnorm/deployment-approval-action@v1
        with:
          approvers: team-lead1, team-lead2
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Production via CodeDeploy
        if: ${{ success() }}
        run: |
          aws deploy create-deployment --application-name PortTrackCodeDeployApp              --deployment-group-name porttrack-bluegreen-group              --github-location repository=org/porttrack,commitId=${{ github.sha }}
